<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>Contact – Amekel Crypto Compass & Medical Tips</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --primary: #062a3f;
      --secondary: #009f6b;
      --accent: #00d48f;
      --bg-soft: #f4f5f7;
      --text-main: #2b2f33;
      --text-muted: #6b7280;
      --white: #ffffff;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg-soft);
      color: var(--text-main);
      -webkit-user-select: none;
      user-select: none;
    }

    header {
      background: var(--white);
      padding: 1rem 2rem;
      border-bottom: 1px solid #d7dde3;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header strong {
      color: var(--primary);
      font-size: 1.1rem;
    }

    .container {
      max-width: 700px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      text-align: center;
    }

    .card-contact {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
      border: 1px solid #d7dde3;
    }

    .avatar-small {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      margin: 0 auto 1rem;
      border: 5px solid var(--accent);
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    .avatar-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h2 {
      margin: 0.5rem 0;
      color: var(--primary);
      font-size: 1.6rem;
      font-weight: 700;
    }

    h3 {
      margin: 0;
      color: var(--secondary);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--text-main);
      margin-bottom: 1.5rem;
    }

    /* FORMULARIO */
    form {
      text-align: left;
      margin-top: 1.5rem;
    }

    label {
      font-weight: 600;
      color: var(--primary);
      display: block;
      margin-bottom: 0.3rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-family: inherit;
    }

    textarea {
      height: 140px;
      resize: none;
    }

    button {
      width: 100%;
      background: var(--secondary);
      color: white;
      padding: 0.9rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: var(--accent);
    }

    a.back {
      display: inline-block;
      margin-top: 2rem;
      text-decoration: none;
      color: var(--secondary);
      font-weight: 600;
      font-size: 1rem;
    }

    a.back:hover {
      color: var(--accent);
    }
  </style>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
  </script>
</head>

<body>

<header>
  <strong>Amekel Crypto Compass & Medical Tips</strong>
</header>

<div class="container">

  <div class="card-contact">

    <div class="avatar-small">
      <img src="img/perfil.jpg" alt="Profile photo">
    </div>

    <h2>Amekel Wood</h2>
    <h3>Educational Content Creator</h3>

    <p>
      Feel free to send a message using the form below.  
      I personally read every email and appreciate your time.
    </p>

    <!-- FORMULARIO REAL -->
    <form action="send.php" method="POST">

      <label>Your Email</label>
      <input type="email" name="from" required placeholder="your-email@example.com">

      <label>Subject</label>
      <input type="text" name="subject" required placeholder="Message subject">

      <label>Message</label>
      <textarea name="message" required placeholder="Write your message here..."></textarea>

      <button type="submit">Send Message</button>
    </form>

  </div>

  <a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
